<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单审核系统 - 安全版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }
        .hidden { display: none !important; }
        .auth-container { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .auth-box { background: white; border-radius: 20px; padding: 40px; width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .auth-title { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 30px; }
        .auth-input { width: 100%; padding: 14px 18px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 16px; margin-bottom: 15px; }
        .auth-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; }
        .auth-btn.primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
        .sidebar { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 12px 24px; border: none; background: transparent; border-radius: 8px; cursor: pointer; text-align: center; }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warn { background: #f59e0b; color: white; }
        .form-group { margin-bottom: 20px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; outline: none; }
        .order-item { padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; background: #fff; }
        .order-item:hover { border-color: #667eea; }
        .status-pending { color: #f59e0b; font-weight: bold; }
        .status-approved { color: #10b981; font-weight: bold; }
        .status-rejected { color: #ef4444; font-weight: bold; }
        .image-preview-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .preview-wrapper { position: relative; width: 100px; height: 100px; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .remove-img-btn { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border-radius: 50%; width: 22px; height: 22px; text-align: center; line-height: 20px; cursor: pointer; }

        #imageOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99999; cursor: grab; justify-content: center; align-items: center; overflow: hidden; }
        #overlayImg { max-width: 90%; max-height: 90%; transition: transform 0.1s ease-out; }
        .close-overlay { position: fixed; top: 20px; right: 20px; color: white; font-size: 40px; cursor: pointer; z-index: 100000; }
    </style>
</head>
<body>
    <div id="imageOverlay"><span class="close-overlay" onclick="closeZoom()">×</span><img id="overlayImg" src="" draggable="false"></div>

    <div id="authScreen" class="auth-container">
        <div class="auth-box">
            <div class="auth-title">🔒 订单审核入口</div>
            <div style="display:flex;gap:10px;margin-bottom:20px;">
                <button onclick="switchAuth('code')" class="btn" style="flex:1; background:#667eea; color:white;">激活码登录</button>
                <button onclick="switchAuth('admin')" class="btn" style="flex:1; background:#f3f4f6;">管理员</button>
            </div>
            <div id="codeLoginPanel"><input type="text" class="auth-input" id="activationCode" placeholder="请输入您的激活码"><button class="auth-btn primary" onclick="activateWithCode()">立即进入</button></div>
            <div id="adminLoginPanel" class="hidden"><input type="text" class="auth-input" id="adminUsername" placeholder="账号"><input type="password" class="auth-input" id="adminPassword" placeholder="密码"><button class="auth-btn primary" onclick="adminLogin()">管理后台登录</button></div>
        </div>
    </div>

    <div id="mainScreen" class="hidden">
        <div class="header"><h1>📋 订单管理系统</h1><div style="display:flex;align-items:center;gap:20px;"><span id="userDisplay"></span><button onclick="location.reload()" class="btn-danger" style="border:none;padding:8px 16px;border-radius:8px;cursor:pointer;">安全退出</button></div></div>
        <div class="container">
            <div class="sidebar"><h3>我的订单列表</h3><div id="orderList" style="margin-top:10px;"></div></div>
            
            <div id="userInterface">
                <div class="tabs"><button class="tab active" onclick="switchTab('upload')">📤 上传订单</button><button class="tab" onclick="switchTab('review')">🔍 查询进度</button></div>
                <div class="panel active" id="uploadPanel"><div class="card"><h3>上传/重传订单</h3><p style="color:#666;font-size:12px;margin-bottom:15px;">* 仅能查看和管理您自己上传的订单数据。</p><div class="form-group"><label>10位订单号</label><input type="number" id="orderNumber"></div><div class="form-group"><div class="upload-area" onclick="document.getElementById('imageFiles').click()">📷 点击上传 (最多5张)</div><input type="file" id="imageFiles" accept="image/*" multiple style="display:none" onchange="handleImagesSelect(event)"><div id="imagePreviewContainer" class="image-preview-container"></div></div><button class="btn btn-primary" onclick="submitOrder()">确认提交</button></div></div>
                <div id="reviewPanel" class="panel"><div class="card"><input type="number" id="searchOrderNumber" class="auth-input" placeholder="输入订单号查询"><button class="btn btn-primary" onclick="searchOrder()">查询我的订单</button><div id="searchResult" style="margin-top:20px;"></div></div></div>
            </div>

            <div id="adminInterface" class="hidden">
                <div class="card" style="background: #fff5f5; border: 1px solid #feb2b2;">
                    <h3 style="color: #c53030;">⚠️ 危险操作区域</h3>
                    <p style="font-size: 13px; margin-bottom: 10px;">清空操作将永久删除所有用户的订单数据和图片，不可恢复！</p>
                    <button class="btn btn-danger" onclick="clearAllOrders()">💣 一键清空所有订单数据</button>
                </div>
                <div class="tabs"><button class="tab active" onclick="switchAdminTab('orders')">📦 待审核订单</button><button class="tab" onclick="switchAdminTab('generate')">🔑 激活码管理</button></div>
                <div class="panel active" id="ordersPanel"><div class="card"><input type="number" id="adminSearchOrder" class="auth-input" placeholder="搜索全库订单号"><button class="btn btn-primary" onclick="adminSearchOrder()">全库搜索</button><div id="adminOrderResult" style="margin-top:20px;"></div></div></div>
                <div class="panel" id="generatePanel"><div class="card"><h3>生成激活码</h3><input type="number" id="generateCount" value="10" style="width:100px;padding:8px;"><button class="btn btn-primary" onclick="generateActivationCodes()">生成</button><div id="codeList" style="margin-top:20px;"></div></div></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDpIr3q6wnAvv-DUESDpk6adZa_Thz5n6c", authDomain: "orderos-3794f.firebaseapp.com", databaseURL: "https://orderos-3794f-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "orderos-3794f", storageBucket: "orderos-3794f.firebasestorage.app" };
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let userId = null, isAdmin = false, currentImages = [], scale = 1, translateX = 0, translateY = 0, isDragging = false, startX, startY;
        const statusMap = { 'pending': '待审核', 'approved': '已通过', 'rejected': '已驳回' };

        // --- 图片缩放逻辑 ---
        const overlay = document.getElementById('imageOverlay'), overlayImg = document.getElementById('overlayImg');
        window.openZoom = (src) => { overlayImg.src = src; overlay.style.display = 'flex'; scale = 1; translateX = 0; translateY = 0; updateImgTransform(); };
        window.closeZoom = () => { overlay.style.display = 'none'; };
        function updateImgTransform() { overlayImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }
        overlay.addEventListener('wheel', (e) => { e.preventDefault(); scale = Math.min(Math.max(0.5, scale + (e.deltaY > 0 ? -0.1 : 0.1)), 10); updateImgTransform(); });
        overlay.addEventListener('mousedown', (e) => { if(e.target === overlayImg) { isDragging = true; startX = e.clientX - translateX; startY = e.clientY - translateY; } });
        window.addEventListener('mousemove', (e) => { if(!isDragging) return; translateX = e.clientX - startX; translateY = e.clientY - startY; updateImgTransform(); });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // --- 登录逻辑 ---
        window.switchAuth = (t) => { document.getElementById('codeLoginPanel').classList.toggle('hidden', t!=='code'); document.getElementById('adminLoginPanel').classList.toggle('hidden', t!=='admin'); };
        window.activateWithCode = async () => {
            const c = document.getElementById('activationCode').value.trim().toUpperCase();
            const s = await get(ref(database, 'activationCodes/'+c));
            if(!s.exists()) return alert('激活码无效');
            userId = s.val().userId || 'user_' + c; // 绑定该激活码为唯一UID
            if(!s.val().userId) await update(ref(database, 'activationCodes/'+c), { userId, isUsed: true });
            enterMain(c, false);
        };
        window.adminLogin = () => {
            if(document.getElementById('adminUsername').value === 'douyinqic123' && document.getElementById('adminPassword').value === 'Aa123456') enterMain('管理员', true);
            else alert('账号密码错误');
        };

        function enterMain(name, admin) {
            isAdmin = admin;
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('userDisplay').textContent = admin ? '👑 管理员' : '🔑 账户:' + name;
            if(admin) {
                document.getElementById('userInterface').classList.add('hidden');
                document.getElementById('adminInterface').classList.remove('hidden');
                initAdmin();
            } else {
                initUser();
            }
        }

        // --- 用户逻辑：只能看到自己的 UID 路径下的数据 ---
        function initUser() {
            onValue(ref(database, `orders/${userId}`), (s) => {
                const o = s.val() || {};
                document.getElementById('orderList').innerHTML = Object.keys(o).map(k => `
                    <div class="order-item" onclick="viewOrder('${k}')">
                        <span>#${k}</span><span class="status-${o[k].status}">${statusMap[o[k].status]}</span>
                    </div>`).join('');
            });
        }
        window.submitOrder = async () => {
            const n = document.getElementById('orderNumber').value;
            if(!/^\d{10}$/.test(n)) return alert('请输入10位数字单号');
            if(currentImages.length === 0) return alert('请上传图片');
            const old = await get(ref(database, `orders/${userId}/${n}`));
            if(old.exists() && old.val().status === 'approved') return alert('该订单已通过，无需重复上传');
            await set(ref(database, `orders/${userId}/${n}`), { orderNumber:n, imageDatas:currentImages, status:'pending', time:Date.now() });
            alert('提交成功'); currentImages = []; renderPreviews();
        };
        window.viewOrder = (n) => { document.getElementById('searchOrderNumber').value = n; switchTab('review'); searchOrder(); };
        window.searchOrder = async () => {
            const n = document.getElementById('searchOrderNumber').value;
            const s = await get(ref(database, `orders/${userId}/${n}`)); // 只能查自己的订单
            if(!s.exists()) return alert('未找到您的订单记录');
            const d = s.val();
            document.getElementById('searchResult').innerHTML = `
                <div class="card">
                    <p>订单号: ${n} | 状态: <b class="status-${d.status}">${statusMap[d.status]}</b></p>
                    ${d.reason ? `<div style="color:red; font-size:13px; margin:10px 0;">理由: ${d.reason}</div>` : ''}
                    <div class="image-preview-container">${d.imageDatas.map(src=>`<img src="${src}" class="preview-img" onclick="openZoom('${src}')">`).join('')}</div>
                </div>`;
        };

        // --- 管理员逻辑 ---
        function initAdmin() {
            onValue(ref(database, 'orders'), (s) => {
                const all = s.val() || {};
                document.getElementById('orderList').innerHTML = '';
                Object.keys(all).forEach(uid => {
                    Object.keys(all[uid]).forEach(num => {
                        const o = all[uid][num];
                        document.getElementById('orderList').innerHTML += `<div class="order-item" onclick="adminView('${uid}','${num}')"><span>${num}</span><span class="status-${o.status}" style="font-size:11px;">${statusMap[o.status]}</span></div>`;
                    });
                });
            });
            onValue(ref(database, 'activationCodes'), (s) => {
                const codes = s.val() || {};
                document.getElementById('codeList').innerHTML = Object.keys(codes).reverse().map(k => `<div>${k} - ${codes[k].isUsed?'🔴已用':'🟢可用'}</div>`).join('');
            });
        }

        // 一键清空功能
        window.clearAllOrders = async () => {
            if(confirm('警告：确定要清空数据库中所有的订单数据吗？此操作无法撤销！')) {
                const pass = prompt('请输入管理员密码确认清空：');
                if(pass === 'Aa123456') {
                    await remove(ref(database, 'orders'));
                    alert('全库订单数据已清空。');
                } else {
                    alert('密码错误，操作取消。');
                }
            }
        };

        window.adminSearchOrder = async () => {
            const n = document.getElementById('adminSearchOrder').value;
            const s = await get(ref(database, 'orders'));
            let target = null, targetUid = null;
            s.forEach(u => { if(u.val()[n]) { target = u.val()[n]; targetUid = u.key; } });
            if(!target) return alert('全库未找到该订单');
            renderAdminDetail(targetUid, n, target);
        };
        window.adminView = async (uid, num) => { const s = await get(ref(database, `orders/${uid}/${num}`)); renderAdminDetail(uid, num, s.val()); };
        function renderAdminDetail(uid, n, d) {
            document.getElementById('adminOrderResult').innerHTML = `
                <div class="card">
                    <p>用户ID: ${uid} | 单号: ${n} | 状态: <b class="status-${d.status}">${statusMap[d.status]}</b></p>
                    <div class="image-preview-container">${d.imageDatas.map(src=>`<img src="${src}" class="preview-img" onclick="openZoom('${src}')">`).join('')}</div>
                    <textarea id="adminReason" placeholder="填写批注/驳回理由" style="width:100%; margin-top:10px; padding:10px;">${d.reason||''}</textarea>
                    <div style="margin-top:10px;">
                        <button class="btn btn-success" onclick="review('${uid}','${n}','approved')">通过</button>
                        <button class="btn btn-danger" onclick="review('${uid}','${n}','rejected')">驳回/打回</button>
                    </div>
                </div>`;
        }
        window.review = async (uid, n, st) => {
            const reason = document.getElementById('adminReason').value;
            await update(ref(database, `orders/${uid}/${n}`), { status: st, reason });
            alert('操作成功');
        };

        window.generateActivationCodes = async () => {
            const count = parseInt(document.getElementById('generateCount').value);
            for(let i=0; i<count; i++) {
                const c = Math.random().toString(36).substr(2, 8).toUpperCase();
                await set(ref(database, 'activationCodes/'+c), { isUsed: false });
            }
            alert('生成成功');
        };

        // --- 辅助功能 ---
        window.handleImagesSelect = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => { const r = new FileReader(); r.onload=(ev)=>{ if(currentImages.length<5) currentImages.push(ev.target.result); renderPreviews(); }; r.readAsDataURL(file); });
        };
        function renderPreviews() { document.getElementById('imagePreviewContainer').innerHTML = currentImages.map((src,i)=>`<div class="preview-wrapper"><img src="${src}" class="preview-img" onclick="openZoom('${src}')"><div class="remove-img-btn" onclick="removeImg(${i})">×</div></div>`).join(''); }
        window.removeImg = (i) => { currentImages.splice(i,1); renderPreviews(); };
        window.switchTab = (id) => { document.querySelectorAll('#userInterface .tab').forEach(t=>t.classList.toggle('active', t.getAttribute('onclick').includes(id))); document.querySelectorAll('#userInterface .panel').forEach(p=>p.classList.toggle('active', p.id===id+'Panel')); };
        window.switchAdminTab = (id) => { document.querySelectorAll('#adminInterface .tab').forEach(t=>t.classList.toggle('active', t.getAttribute('onclick').includes(id))); document.querySelectorAll('#adminInterface .panel').forEach(p=>p.classList.toggle('active', p.id===id+'Panel')); };
    </script>
</body>
</html>
